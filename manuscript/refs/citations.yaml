# citations.yaml — single source of truth for every citation key.
#
# Body sections cite work via `[@citekey]` (Pandoc-style); the injector
# rewrites these to author-year form for the rendered Markdown and
# auto-generates the bibliography section from the same data.
#
# Keys follow the convention `lastname-yyyy` (lowercased).  When two
# entries collide, append `-a`, `-b`, …  (e.g. `friston-2024-a`).
#
# Schema per entry:
#   authors:    str      — comma-joined author list
#   year:       int      — publication year
#   title:      str
#   venue:      str      — journal / conference / book
#   volume:     str      — optional
#   pages:      str      — optional
#   doi:        str      — optional
#   url:        str      — optional
#   note:       str      — optional editorial note (renders as italics)
#   topic:      str      — bibliography category (used for grouping)


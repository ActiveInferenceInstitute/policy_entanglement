theorems:
  # Each theorem has a `kind`, a `number`, an optional `name`, the
  # section in which it is stated, an optional Lean companion
  # (`lean_module` + `lean_name`), and a Mathlib-readiness `status`
  # (one of: proved, boundary, sorry, sketch, deferred).
  # The `[[LEAN:label]]` token embeds the actual Lean source extracted
  # from `lean/ActinfPolicyEntanglement/<lean_module>.lean`.
  thm_4_1:    {kind: "Theorem",     number: "4.1",  name: "Entanglement Decomposition",       section: decomposition.statement, lean_module: Decomposition,  lean_name: entanglement_decomposition,                       status: boundary}
  cor_4_2:    {kind: "Corollary",   number: "4.2",  name: "Coupling-pays-for-itself",          section: decomposition.reading,   lean_module: Decomposition,  lean_name: couplingVerdict,                                  status: sketch}
  cor_4_3:    {kind: "Corollary",   number: "4.3",  name: "Mean-field at λ = 0",                section: decomposition.reading,   lean_module: Decomposition,  lean_name: decomposition_at_zero,                            status: boundary}
  cor_4_4:    {kind: "Corollary",   number: "4.4",  name: "Strict gain when q is non-mean-field", section: decomposition.reading, lean_module: Decomposition,  lean_name: strict_gain_iff_nonMeanField,                     status: boundary}
  thm_4_2:    {kind: "Theorem",     number: "4.5",  name: "Existence of optimal coupling",     section: decomposition.optimal,   lean_module: ~,              lean_name: ~,                                                status: deferred}
  thm_4_3:    {kind: "Theorem",     number: "4.6",  name: "Convexity of F in λ",                section: decomposition.optimal,   lean_module: ~,              lean_name: ~,                                                status: deferred}
  prop_6_1:   {kind: "Proposition", number: "6.1",  name: "MF submanifold is e-flat",          section: geometry.dual_coords,    lean_module: Geometry,       lean_name: mfSubmanifold_eFlat,                              status: sketch}
  prop_6_2:   {kind: "Proposition", number: "6.2",  name: "m-projection / marginalisation",    section: geometry.dual_coords,    lean_module: Geometry,       lean_name: mProjection_minimises_kl,                         status: proved}
  prop_6_3:   {kind: "Proposition", number: "6.3",  name: "Total correlation as Bregman divergence", section: geometry.dual_coords, lean_module: FreeEnergy,  lean_name: totalCorrelation_eq_kl_to_mprojection,            status: proved}
  thm_6_4:    {kind: "Theorem",     number: "6.4",  name: "λ-family is an e-geodesic",         section: geometry.e_geodesic,     lean_module: Geometry,       lean_name: entangledFamily_eGeodesic,                        status: forwarder}
  prop_6_5:   {kind: "Proposition", number: "6.5",  name: "Pythagorean decomposition",         section: geometry.e_geodesic,     lean_module: Geometry,       lean_name: dualFlat_pythagorean_sketch,                      status: sketch}
  prop_7_1:   {kind: "Proposition", number: "7.1",  name: "Schmidt rank 1 ⇔ mean-field",      section: spectral.bipartite,      lean_module: Spectral,       lean_name: "Bipartite.schmidtRank_one_iff_meanField",        status: boundary}
  prop_7_2:   {kind: "Proposition", number: "7.2",  name: "Schmidt rank upper-semicontinuous in λ", section: spectral.bipartite, lean_module: Spectral,       lean_name: "Bipartite.schmidtRank_upperSemicontinuous_sketch", status: sketch}
  thm_7_3:    {kind: "Theorem",     number: "7.3",  name: "Sparsity-rank tradeoff",            section: spectral.multistream_tt, lean_module: Spectral,       lean_name: sparsityRank_tradeoff,                            status: sketch}
  thm_8_1:    {kind: "Theorem",     number: "8.1",  name: "Heterogeneous coupling tax",        section: heterogeneous.bound,     lean_module: Heterogeneous,  lean_name: couplingTax_quadratic_bound,                      status: boundary}
  cor_8_2:    {kind: "Corollary",   number: "8.2",  name: "Reflexive-stream tolerance",        section: heterogeneous.bound,     lean_module: Heterogeneous,  lean_name: couplingTax_small_lambda_tolerance,               status: boundary}
  prop_10_1:  {kind: "Proposition", number: "10.1", name: "Local concavity of F at λ=0",       section: comparative.sensitivity, lean_module: ~,              lean_name: ~,                                                status: deferred}
  thm_11_1:   {kind: "Theorem",     number: "11.1", name: "Hierarchical AIF as λ→∞ limit",     section: connections.hierarchical, lean_module: ~,             lean_name: ~,                                                status: deferred}
  prop_11_2:  {kind: "Proposition", number: "11.2", name: "Sophisticated inference embedding", section: connections.sophisticated, lean_module: ~,            lean_name: ~,                                                status: deferred}
  prop_11_3:  {kind: "Proposition", number: "11.3", name: "Markov-blanket separation as 1 − I/H", section: connections.markov,   lean_module: ~,              lean_name: ~,                                                status: deferred}

equations:
  tc_decomp:
    latex: |
      F[q] = \sum_k F[q^k]
            + \gamma \, \lambda \, \mathbb{E}_q[K_c]
            + \lambda \, \mathbb{E}_q[J] - \log Z_E(\lambda)
            - I(q)
    name: "Entanglement decomposition"
    sections: ["§4"]

  ising_mi_closed_form:
    latex: |
      I(\lambda) = \log 2 - H_b(\sigma(\lambda)),
      \quad \sigma(\lambda) = \frac{1}{1 + e^{-\lambda}}
    name: "Closed-form K=2 Ising mutual information"
    sections: ["§5.1", "Appendix C"]

  optimal_lambda:
    latex: |
      \lambda^\star(\Delta_{\mathrm{util}})
        = 2 \, \operatorname{arctanh}\!\left(\frac{\Delta_{\mathrm{util}}}{\Delta_{\max}}\right)
    name: "Optimal coupling under utility surplus"
    sections: ["§5.1", "§10"]

  pythagorean:
    latex: |
      D_{\mathrm{KL}}(q \,\|\, q_0^*)
        = I(q) + D_{\mathrm{KL}}(\hat m(q) \,\|\, q_0^*)
    name: "Pythagorean decomposition"
    sections: ["§6"]

  e_geodesic:
    latex: |
      \log q_\lambda(\pi) + \log Z(\lambda)
        = \sum_k \log E_k(\pi^k) - \gamma \sum_k G_k(\pi^k)
          + \lambda \, (J(\pi) - \gamma K_c(\pi))
    name: "e-geodesic affineness in λ"
    sections: ["§6", "§13"]

  coupling_tax_bound:
    latex: |
      D_{\mathrm{KL}}(q^k_*\,\|\,q^k_\circ)
        \;\leq\; C \cdot \lambda^2 \, \|\Phi\|_\infty^2 + O(\lambda^3)
    name: "O(λ²) coupling tax"
    sections: ["§8"]

  total_correlation:
    latex: |
      I(q) = \sum_k H(q^k) - H(q) = D_{\mathrm{KL}}(q \,\| \, \prod_k q^k)
    name: "Total correlation"
    sections: ["§4", "§6"]

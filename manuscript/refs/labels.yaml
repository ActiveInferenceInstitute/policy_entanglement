equations:
  tc_decomp:
    latex: |
      F[q] = \sum_k F[q^k]
            + \gamma \, \lambda \, \mathbb{E}_q[K_c]
            + \log Z_E(\lambda)
            - \lambda \, \mathbb{E}_q[J]
            + I(q)
    name: "Entanglement decomposition"
    sections: ["§5", "Appendix A"]

  ising_mi_closed_form:
    latex: |
      I(q_\lambda) \;=\; \lambda J_0 \tanh(\lambda J_0)
                    \;-\; \log\cosh(\lambda J_0)
                    \;=\; \log 2 - H_b\!\left(\sigma(2\lambda J_0)\right),
      \quad \sigma(x) = \frac{1}{1 + e^{-x}}
    name: "Closed-form K=2 Ising mutual information"
    sections: ["§6.1", "Appendix C"]

  optimal_lambda:
    latex: |
      \lambda^\star(\Delta_{\mathrm{align}})
        = 2 \, \operatorname{arctanh}\!\left(\frac{\Delta_{\mathrm{align}}}{\Delta_{\max}}\right)
    name: "Alignment-inversion coupling for the K=2 Bernoulli toy"
    description: |
      Inverse map from a *target alignment* $\Delta_{\mathrm{align}}$ to the
      coupling $\lambda$ that realizes it under the K=2 symmetric Bernoulli
      toy (so $\alpha(\lambda) = \tanh(\lambda/2) = \Delta_{\mathrm{align}}/\Delta_{\max}$).
      This is *not* a VFE optimum: it is target-alignment inversion.  Only in
      the small-utility regime does it coincide with the VFE-optimal
      $\lambda^\star = 2u$ (see [[SECREF:app.bernoulli]]); it diverges from
      $2\,\operatorname{arctanh}(u)$ at larger $u$.
    sections: ["§6.1", "§11", "Appendix C"]

  pythagorean:
    latex: |
      D_{\mathrm{KL}}(q \,\|\, q_0^*)
        = I(q) + D_{\mathrm{KL}}(\hat m(q) \,\|\, q_0^*)
    name: "Pythagorean decomposition"
    sections: ["§7.2"]

  e_geodesic:
    latex: |
      \log q_\lambda(\pi) + \log Z(\lambda)
        = \sum_k \log E_k(\pi^k) - \gamma \sum_k G_k(\pi^k)
          + \lambda \, (J(\pi) - \gamma K_c(\pi))
    name: "e-geodesic affineness in λ"
    sections: ["§7.2"]

  coupling_tax_bound:
    latex: |
      D_{\mathrm{KL}}(q^k_*\,\|\,q^k_\circ)
        \;\leq\; C \cdot \lambda^2 \, \|\Phi\|_\infty^2 + O(\lambda^3)
    name: "O(λ²) coupling tax"
    sections: ["§9.3"]

  total_correlation:
    latex: |
      I(q) = \sum_k H(q^k) - H(q) = D_{\mathrm{KL}}(q \,\| \, \prod_k q^k)
    name: "Total correlation"
    sections: ["§5", "§7.1"]

  closed_form_F:
    latex: |
      F[q_\lambda] \;=\; \log Z_E(\lambda) \;-\; \log Z(\lambda)
    name: "Closed exponential-family form of F[q_lambda]"
    sections: ["§5", "§11", "Appendix A", "Appendix B"]

  dF_dlambda:
    latex: |
      \frac{\mathrm{d} F[q_\lambda]}{\mathrm{d}\lambda}
        \;=\; \langle J \rangle_{\mathcal{E}_\lambda}
            \;-\; \langle J \rangle_{q_\lambda}
            \;+\; \gamma\,\langle K_c \rangle_{q_\lambda}
    name: "First derivative of F in lambda along the family"
    sections: ["§5", "§11"]

  d2F_dlambda2:
    latex: |
      \frac{\mathrm{d}^2 F[q_\lambda]}{\mathrm{d}\lambda^2}
        \;=\; \mathrm{Var}_{\mathcal{E}_\lambda}(J)
            \;-\; \mathrm{Var}_{q_\lambda}(J - \gamma K_c)
    name: "Second derivative of F in lambda (Fisher form)"
    sections: ["§11", "Appendix B"]

  dispersion_comparison:
    latex: |
      \mathrm{Var}_{\mathcal{E}_\lambda}(J) \;\geq\; \mathrm{Var}_{q_\lambda}(J - \gamma K_c)
      \qquad \text{for all } \lambda \geq 0
    name: "Dispersion-comparison inequality (Q1 reformulation of convexity)"
    sections: ["§20"]

  mi_derivative_covariance:
    latex: |
      \frac{\mathrm{d} I(q_\lambda)}{\mathrm{d}\lambda}
        \;=\; \mathrm{Cov}_{q_\lambda}\!\big(J - \gamma K_c,\;
                                            \log q_\lambda - \log \hat m(q_\lambda)\big)
    name: "Covariance form of dI/dlambda along the e-geodesic"
    sections: ["§5", "§9"]

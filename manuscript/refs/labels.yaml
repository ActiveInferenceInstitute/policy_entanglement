# labels.yaml — single source of truth for every manuscript figure and
# equation reference.  Consumed by `scripts/inject_manuscript_variables.py`,
# which substitutes tokens of the form
#
#   [[FIG:label]]    →  Markdown image directive with caption + path
#   [[FIGREF:label]] →  inline cross-reference ("Fig. X")
#   [[EQ:label]]     →  display-math equation with auto-numbering
#   [[EQREF:label]]  →  inline cross-reference ("Eq. (X)")
#
# Figure paths are project-relative; the injector rewrites them to the
# manuscript-relative form (`../output/...`) at render time.
#
# Numbering: figures and equations are auto-numbered in the order they
# appear here.  Manual `number:` overrides are honoured if set.

figures:
  ising_mi_curve:
    path: output/figures/ising_mi_curve.png
    caption: |
      Closed-form vs empirical mutual information of the K=2 Ising joint
      at $\lambda \in [0, 6]$. The closed-form curve $I(\lambda)
      = \log 2 - H_b(\sigma(\lambda))$ overlays the empirical total
      correlation of the entangled posterior; agreement is to $10^{-6}$
      across 121 grid points (`output/data/parameter_sweep.csv`).
    short: "Closed-form vs empirical Ising MI"
    sections: ["§5.1", "§13"]
    source: scripts/generate_figures.py::figure_ising_mi_curve

  free_energy_curve:
    path: output/figures/free_energy_curve.png
    caption: |
      Free-energy curve $F[q_\lambda]$ for the symmetric K=2 Ising toy
      across utility surplus $\Delta_{\mathrm{util}} \in \{0, 0.5, 1, 2\}$.
      The U-shape collapses to a monotone-decreasing curve when
      $\Delta_{\mathrm{util}} = 0$ (Ising-like degeneracy of §5).
    short: "K=2 Ising free-energy curve"
    sections: ["§5.1", "Appendix B", "§13"]
    source: scripts/generate_figures.py::figure_free_energy_curve

  coupling_tax_quadratic:
    path: output/figures/coupling_tax_quadratic.png
    caption: |
      Heterogeneous K=2 coupling tax (blue dots) overlaid with the
      fitted $O(\lambda^2)$ envelope (dashed) on $\lambda \in [0, 1.5]$.
      The envelope's curvature constant $C$ is computed from the
      small-$\lambda$ slope and printed in the figure legend; the
      same envelope captures the actual tax across the full sweep —
      i.e. the heterogeneous coupling-tax bound in numerical action.
    short: "O(λ²) coupling-tax envelope"
    sections: ["§8", "§13"]
    source: scripts/generate_figures.py::figure_coupling_tax_quadratic

  phase_diagram:
    path: output/figures/phase_diagram.png
    caption: |
      Coupling phase diagram on $\lambda \in [0, 4]$, with the three
      phases of §9 (disordered / mixed / frozen) shaded as fill-bands at
      illustrative critical thresholds $(\lambda_c^{(1)},
      \lambda_c^{(2)}) = (0.5, 2.5)$.
    short: "1-D phase diagram"
    sections: ["§9", "§13"]
    source: scripts/generate_figures.py::figure_phase_diagram

  optimal_lambda:
    path: output/figures/optimal_lambda.png
    caption: |
      Closed-form optimal coupling
      $\lambda^\star(\Delta_{\mathrm{util}}) = 2 \,
      \operatorname{arctanh}(\Delta_{\mathrm{util}} / \Delta_{\max})$
      across $\Delta_{\mathrm{util}} / \Delta_{\max} \in [-0.95, 0.95]$.
      Vanishes at $\Delta_{\mathrm{util}} = 0$, saturates at $\pm \infty$
      as $\Delta_{\mathrm{util}} \to \pm \Delta_{\max}$.
    short: "Optimal λ*(Δ)"
    sections: ["§5.1", "§10", "§13"]
    source: scripts/generate_figures.py::figure_optimal_lambda

  schmidt_rank:
    path: output/figures/schmidt_rank.png
    caption: |
      Schmidt rank of the K=2 Ising joint posterior as $\lambda$ varies
      on $[0, 4]$. The integer rank jumps from $1$ (mean-field manifold)
      to $2$ instantly when any coupling is on — leaving the mean-field
      submanifold ($r=1$) for $r=2$.
    short: "Schmidt rank vs λ"
    sections: ["§7.1", "§13"]
    source: scripts/generate_figures.py::figure_schmidt_rank_vs_lambda

  phase_landscape:
    path: output/figures/phase_landscape.png
    caption: |
      Free-energy phase landscape: $F(\lambda, \mathrm{utility})$ on
      $[0,4] \times [0,2]$.  The U-shaped low-utility band (cf. §9)
      gives way to monotone-decreasing curves at high utility, and the
      locus of $\lambda^\star$ is the colour minimum at each utility.
    short: "F(λ, utility) phase landscape"
    sections: ["§9", "§13"]
    source: scripts/generate_figures.py::figure_phase_landscape

  schmidt_entropy_surface:
    path: output/figures/schmidt_entropy_surface.png
    caption: |
      Entanglement entropy $S_E(\lambda, \mathrm{utility})$ heatmap on
      $[0,4] \times [0,2]$. The $S_E = 0$ band at $\lambda = 0$ marks
      the mean-field submanifold; $S_E$ grows with $\lambda$ then
      saturates as the joint approaches an archetypal mode.
    short: "Schmidt entropy heatmap"
    sections: ["§7", "§13"]
    source: scripts/generate_figures.py::figure_schmidt_entropy_surface

  joint_heatmap_lambda2:
    path: output/figures/joint_heatmap_lambda2.png
    caption: |
      K=2 Ising joint posterior at $\lambda = 2$ rendered as a heatmap
      with side-bar marginals and the m-projection residual $q -
      \prod_k q^k$ in the upper-right inset. The non-zero residual is
      the visual signature of departure from the mean-field manifold.
    short: "K=2 joint heatmap with marginals"
    sections: ["§5.1", "§13"]
    source: scripts/generate_figures.py::figure_joint_heatmap_with_marginals

  archetype_dendrogram:
    path: output/figures/archetype_dendrogram.png
    caption: |
      Schmidt archetypes for the K=2 Ising joint at $\lambda = 3$. Left
      panel: archetype weights $\{s_\alpha\}$ in descending order. Right
      panel: pairwise overlap matrix
      $|\langle u_i, u_j\rangle| \cdot |\langle v_i, v_j\rangle|$
      — diagonal-dominant by construction (orthonormal SVD basis).
    short: "Schmidt archetype dendrogram"
    sections: ["§7.2", "§13"]
    source: scripts/generate_figures.py::figure_archetype_dendrogram

  tensor_train_rank_surface:
    path: output/figures/tensor_train_rank_surface.png
    caption: |
      Tensor-train bond-rank profile $(r_1, \ldots, r_{K-1})$ for the
      symmetric Ising K-stream coupling at $\lambda = 2$ across
      $K \in \{2, 3, 4, 5\}$. Bond dimensions saturate at $r_j \le 2$
      — consistent with the sparsity--rank tradeoff for low-rank couplings.
    short: "Tensor-train rank surface"
    sections: ["§7.3", "§13"]
    source: scripts/generate_figures.py::figure_tensor_train_ranks

  log_weight_flow:
    path: output/figures/log_weight_flow.png
    caption: |
      e-geodesic visualisation: unnormalised log-weight $\log
      \mathcal{E}_\lambda(\pi) - \gamma \lambda K_c(\pi)$ for every
      policy $\pi \in \{0,1\}^2$ across $\lambda \in [0, 3]$ for the
      symmetric Ising coupling with $K_c \neq 0$. Each line is exactly
      affine in $\lambda$ — the numerical signature of an e-geodesic family.
    short: "Log-weight e-geodesic flow"
    sections: ["§6", "§13"]
    source: scripts/generate_figures.py::figure_log_weight_flow

  coupling_graph:
    path: output/figures/coupling_graph.png
    caption: |
      Coupling-potential graph for the symmetric K=4 Ising ensemble.
      Each node is one stream; edge weights are the average $|J|$ across
      slot pairs. Symmetric coupling produces an evenly-weighted clique;
      CEREBRUM-style case-grammar couplings would manifest as
      edge-weight asymmetry.
    short: "Coupling-potential graph"
    sections: ["§11.12 (CEREBRUM)", "§13"]
    source: scripts/generate_figures.py::figure_coupling_graph

  pymdp_total_correlation_curve:
    path: output/figures/pymdp_total_correlation_curve.png
    caption: |
      pymdp-grounded total correlation $I(q_\lambda)$ as a function of
      coupling $\lambda$ for the K=2 Ising ensemble, observations
      $(0, 0)$. Smooth monotone increase from the mean-field baseline
      $0$ toward saturation at $\log 2 \approx 0.693$ — the empirical
      witness of Prop 6.3 inside a grounded POMDP.
    short: "pymdp total correlation curve"
    sections: ["§11.1", "§13"]
    source: scripts/simulate_pymdp.py::figure_pymdp_lambda_sweep

  pymdp_joint_lambda_0:
    path: output/figures/pymdp_joint_lambda_0.00.png
    caption: |
      Coupled joint policy posterior at $\lambda = 0$ (pure mean-field).
      Marginals (top / right bars) match the per-stream pymdp
      posteriors; the m-projection residual (top-right inset) is
      identically zero.
    short: "pymdp joint at λ=0"
    sections: ["§13"]
    source: scripts/simulate_pymdp.py::figure_pymdp_lambda_sweep

  pymdp_joint_lambda_2:
    path: output/figures/pymdp_joint_lambda_2.00.png
    caption: |
      Coupled joint at $\lambda = 2$. Off-diagonal mass redistributes
      onto aligned $(0,0) / (1,1)$ corners; m-projection residual is
      non-zero, confirming Schmidt rank $r = 2 > 1$.
    short: "pymdp joint at λ=2"
    sections: ["§13"]
    source: scripts/simulate_pymdp.py::figure_pymdp_lambda_sweep

  pymdp_joint_lambda_4:
    path: output/figures/pymdp_joint_lambda_4.00.png
    caption: |
      Coupled joint at $\lambda = 4$ (frozen regime). Aligned corners
      dominate; the residual is large; the system has essentially
      collapsed onto a single archetypal mode.
    short: "pymdp joint at λ=4"
    sections: ["§13"]
    source: scripts/simulate_pymdp.py::figure_pymdp_lambda_sweep

  pymdp_coupled_rollout:
    path: output/figures/pymdp_coupled_rollout.png
    caption: |
      Deterministic 10-step coupled rollout under $\lambda = 2$,
      seed $= 0$. Per-stream marginals $q_t^k$ (left two heatmaps)
      interleave with the coupled total correlation $I(q_t)$ (right).
      Reproducibility is asserted by
      `tests/test_simulation_pymdp.py::test_simulate_coupled_rollout_deterministic_under_fixed_seed`.
    short: "pymdp coupled rollout"
    sections: ["§11.1", "§13"]
    source: scripts/simulate_pymdp.py::figure_pymdp_rollout

  kl_geodesic_simplex:
    path: output/figures/kl_geodesic_simplex.png
    caption: |
      The K=2 Ising joint posterior traced in a 2-D summary plane
      spanned by aligned-corner mass $q(0,0)+q(1,1)$ (horizontal) and
      off-diagonal disparity $|\Delta_{\rm row}|+|\Delta_{\rm col}|$
      (vertical) as $\lambda \in [0, 4]$.  The trace departs the
      mean-field anchor (red star) at $\lambda = 0$ and bends toward
      an archetypal corner — a visual e-geodesic in the simplex
      coordinates used here.
    short: "KL geodesic in the 2-D summary plane"
    sections: ["§6", "§13"]
    source: scripts/generate_figures.py::figure_kl_geodesic_in_simplex

  lambda_star_locus:
    path: output/figures/lambda_star_locus.png
    caption: |
      Optimal coupling $\lambda^\star$ across $(\mathrm{utility},
      \gamma)$ for the K=2 Ising toy.  $\lambda^\star$ grows
      sigmoidally in utility surplus and is amplified by larger EFE
      precision $\gamma$, locating the *comparative-statics* surface
      of §10.
    short: "λ⋆(utility, γ) locus"
    sections: ["§10", "§13"]
    source: scripts/generate_figures.py::figure_lambda_star_locus

